      - era_2
      - era_3
  data_requirements:
    - capability_id: alpaca_equity_ohlcv
      required: true
      status: AVAILABLE
      status_at_draft: AVAILABLE
      purpose: alpaca_equity_ohlcv
    - capability_id: fundamentals_basic
      required: true
      status: PARTIAL
      status_at_draft: PARTIAL
      purpose: fundamentals_basic
  evidence_thresholds:
    minimum_trade_count: 50
    minimum_evaluated_trading_days: 20
  decisive_verdict_rules:
    pass: >-
      Passes only if it beats the benchmark after meeting the minimum trade-count and evaluated-days
      thresholds.
    inconclusive: >-
      Trade count < 50 after running the full primary window. Expand universe to all
      Alpaca-tradeable US equities and re-run before rendering a verdict.
    fail: >-
      Fails if it underperforms the benchmark or breaches risk limits after evidence thresholds are
      met.
  known_limitations:
    - >-
      CRITICAL — IPO date metadata: fundamentals_basic provides only a current snapshot via Alpaca
      asset metadata. It is NOT point-in-time. Survivorship bias is present: tickers that were
      acquired, delisted, or went private will be missing from the universe. This is a structural
      limitation of the current data catalog.
    - >-
      IPO date accuracy: For many tickers, especially those that listed via SPAC, direct listing, or
      spin-off, the 'IPO date' in metadata may reflect the listing date rather than the original
      offering date. The anniversary signal may fire on the wrong date for these names.
    - >-
      Trade count uncertainty: The actual number of anniversary matches per year depends entirely on
      how many tickers in the chosen universe have IPO dates that fall on trading days and are
      accurately recorded. This cannot be confirmed without running the data pull.
    - >-
      Same-day liquidity: The strategy enters and exits on the same day. For smaller names in the
      universe, same-day fills at open and close may carry meaningful slippage not captured in OHLCV
      backtest.
    - >-
      Operator context: The operator has stated this is a functional/plumbing test, not a live
      trading candidate. The experiment plan is drafted in good faith to validate the mechanics, but
      the thesis has no established academic or practitioner precedent and should be treated as
      exploratory.
    - >-
      No historical fundamentals: fundamentals_basic is a current snapshot only. Historical
      point-in-time IPO dates are not available via a wired catalog connector. The backtest will use
      today's metadata applied backward, which is a form of look-ahead for any ticker whose listing
      status changed.
