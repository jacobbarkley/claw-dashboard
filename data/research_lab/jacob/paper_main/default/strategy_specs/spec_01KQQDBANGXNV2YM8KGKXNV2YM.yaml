signal_logic: >-
  IPO Anniversary Signal: On each trading day, identify all stocks in the universe whose IPO date
  shares the same month and day as the current calendar date (MM-DD match). These stocks are flagged
  as 'anniversary candidates' for that session.
universe:
  description: US-listed equities with a known IPO date on record, filtered for basic liquidity.
entry_rules: >-
  {"trigger":"Signal fires at market open on the anniversary trading day. If the anniversary date
  falls on a weekend or holiday, the signal fires on the next valid trading
  day.","order_type":"market_on_open","position_sizing":"Equal-weight across all anniversary
  candidates on a given day. Maximum 5% of portfolio per position to prevent concentration on days
  with few candidates.","confirmation_filter":"None required for baseline test. Optional v2 filter:
  require 20-day average daily volume > 500,000 shares to exclude illiquid
  names.","max_concurrent_positions":20,"notes":"On days with zero anniversary candidates, no trades
  are placed. On days with many candidates, the equal-weight cap applies."}
exit_rules: >-
  {"primary_exit":"Close position at end of the same trading day (intraday hold). The anniversary
  effect, if real, is expected to be a single-session
  phenomenon.","stop_loss_pct":5,"target_pct":null,"hold_period":"1 trading day (same-session
  close)","notes":"A 5% intraday stop is included as a risk guardrail. No profit target is set for
  the baseline — the position exits at close regardless. A v2 variant could test a 2-day or 5-day
  hold to check if any effect persists."}
risk_model:
  description: >-
    {"position_limit_pct":5,"max_portfolio_heat_pct":25,"stop_loss_pct":5,"target_pct":null,"max_drawdown_abort_pct":15,"sizing_method":"equal_weight","notes":"Because
    anniversary candidates are sparse and calendar-driven, portfolio heat will typically be low. The
    25% max heat cap prevents runaway exposure on rare days with many simultaneous anniversaries.
    The 15% portfolio drawdown abort is a circuit breaker for the backtest engine."}
sweep_params: {}
required_data:
  - alpaca_equity_ohlcv
  - fundamentals_basic
benchmark: SPY
acceptance_criteria:
  min_sharpe: 0.3
  max_drawdown: 15
  min_hit_rate: 50
  other: >-
    Minimum 50 completed round-trip trades required before any acceptance or rejection verdict is
    rendered. If trade count is below 50, the result is inconclusive and the universe must be
    expanded.
