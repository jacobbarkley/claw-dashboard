signal_logic: >-
  Primary signal: ApeWisdom top-100 retail attention rank improvement. A stock enters the signal
  universe when its ApeWisdom rank improves (rank number decreases) over a rolling lookback window
  (e.g., 3-day or 5-day). Momentum confirmation: require that the stock's closing price is above its
  N-day simple moving average (e.g., 20-day SMA) using Alpaca OHLCV daily bars, confirming that
  price action is consistent with rising retail interest. Combined signal fires when both conditions
  are met simultaneously.
universe:
  description: >-
    US equities present in the ApeWisdom top-100 retail attention ranking on the signal date,
    cross-referenced with Alpaca equity universe (tradable, non-OTC preferred). No explicit
    market-cap filter in v1 (fundamentals_basic is snapshot-only and not point-in-time safe);
    operator may apply a manual liquidity screen using average daily volume from Alpaca asset
    metadata as a pre-filter.
entry_rules: >-
  Enter a long position at the next day's open (using Alpaca daily OHLCV open price) when: (1) the
  stock's ApeWisdom rank has improved by at least R positions over the lookback window (e.g., rank
  improved by ≥10 positions over 3 days), AND (2) the prior day's closing price is above the 20-day
  SMA. Limit entries to stocks present in the ApeWisdom top-100 list on the signal date. No short
  entries in this initial version.
exit_rules: >-
  Exit the position at the open of the Nth day after entry (e.g., holding period = 5 trading days),
  OR if the closing price falls below the 20-day SMA on any day during the holding period (momentum
  invalidation stop), whichever comes first. No hard stop-loss beyond the SMA exit in the base spec;
  sweep params will test trailing stops.
risk_model:
  description: >-
    Equal-weight position sizing across all concurrent signals, capped at a maximum of 10
    simultaneous positions (10% gross weight per position). Maximum gross exposure: 100% long. No
    leverage. Per-trade risk limited implicitly by equal-weight cap. No sector concentration
    constraint in v1 — note this as a known gap given the retail-attention universe may cluster in
    meme-adjacent sectors.
sweep_params:
  description: >-
    Rank improvement threshold R: [5, 10, 15, 20]; Lookback window: [3, 5, 7 days]; SMA period: [10,
    20, 30 days]; Holding period: [3, 5, 10 days]; Max concurrent positions: [5, 10, 15]
required_data:
  - apewisdom_top100
  - alpaca_equity_ohlcv
benchmark: SPY (S&P 500 ETF) total return, sourced from alpaca_equity_ohlcv
acceptance_criteria:
  min_sharpe: 0.8
  max_drawdown: 25
  min_hit_rate: 45
  other: >-
    Minimum 50 trades over backtest period to ensure statistical credibility. Backtest window:
    2024-present (constrained by ApeWisdom coverage start). Annualized return must exceed SPY over
    the same window.
candidate_strategy_family: Retail-sentiment momentum (attention-driven price continuation)
