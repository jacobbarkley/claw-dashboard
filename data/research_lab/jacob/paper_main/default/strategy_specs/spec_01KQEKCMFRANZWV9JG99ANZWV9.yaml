  ApeWisdom coverage begins 2024; backtest history is limited to ~2 years. This is a known
  constraint — results may not generalize across multiple market regimes. Raw per-thread Reddit
  velocity is intentionally excluded per thesis; ApeWisdom aggregated rank is the sole sentiment
  input. Fundamentals, options, macro, Wikipedia, GDELT, and Google Trends are all explicitly
  excluded per operator thesis. Sector clustering risk in meme-adjacent names (tech, biotech, EV)
  should be monitored in post-backtest analysis even if no hard constraint is applied in v1.
