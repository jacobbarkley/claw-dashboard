      required: true
      status: AVAILABLE
      status_at_draft: AVAILABLE
      purpose: alpaca_equity_ohlcv
  evidence_thresholds:
    minimum_trade_count: 5
    minimum_evaluated_trading_days: 20
  decisive_verdict_rules:
    pass: >-
      Passes only if it beats the benchmark after meeting the minimum trade-count and evaluated-days
      thresholds.
    inconclusive: >-
      {"condition":"Any sleeve produces < 30 trades in the full window OR profitable fold pct is
      between 40-50% for >= 2 sleeves. Action: extend test window by
      inconclusive_follow_up_window_days or substitute underperforming sleeve symbols."}
    fail: >-
      Fails if it underperforms the benchmark or breaches risk limits after evidence thresholds are
      met.
  known_limitations:
    - >-
      Sleeve compositions (B through F) are Talon initial proposals and have not been
      operator-confirmed. Operator must review and approve symbol lists before promotion.
    - >-
      Sleeve selection methodology is qualitative in v1 (sector/theme coherence). A quantitative
      screening process (e.g., minimum ADV, correlation filter, momentum factor loading) is deferred
      to v2.
    - >-
      Capital allocation across sleeves is equal-weight in v1. Dynamic regime-based sleeve weighting
      is a v2 enhancement.
    - >-
      COIN and AFRM in sleeve_C (Financials) have shorter listing histories and higher volatility
      than the original sleeve members. They may produce fewer qualifying signals and should be
      monitored for volatility filter suppression.
    - >-
      SNOW and MDB in sleeve_B (Cloud SaaS) IPO'd in late 2020; pre-2021 history is thin. The
      era_covid_recovery era will have reduced data for these symbols.
    - >-
      Cross-sleeve concentration risk: in strong bull regimes, tech-adjacent sleeves (A, B, F) may
      all activate simultaneously, reducing diversification benefit. The concentration guard in the
      risk model partially mitigates this but does not eliminate it.
    - >-
      The phase1_short window (2026 tape) is a plumbing/signal-wiring check only. Expected trade
      count is low and no standalone edge conclusion should be drawn from it.
    - >-
      All data dependencies are OHLCV-only (alpaca_equity_ohlcv). No exotic data sources are
      required. This is a deliberate fidelity choice to maintain the proven signal logic of the
      parent strategy.
    - >-
      Future sleeve additions or substitutions should re-run the full experiment_plan before
      promotion.
