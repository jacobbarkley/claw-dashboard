signal_logic: >-
  Regime-aware momentum applied across multiple sleeves of 6 stocks each. Each sleeve is selected to
  share internal coherence characteristics (sector homogeneity, liquidity tier, beta profile, or
  thematic linkage) similar to the original AVGO/NVDA/AAPL/LLY/META/COST group. Within each sleeve,
  the same momentum signal logic from the Regime-Aware Momentum Frozen Reference Paper v1 is
  applied: measure trailing return over a lookback window, filter by a volatility cap, and gate all
  entries on a benchmark trend filter (SPY above its N-day moving average). Regime detection uses
  SPY trend as the macro gate. Each sleeve operates as an independent sub-portfolio with its own
  position sizing, so regime-appropriate sleeves are active while others are suppressed.
universe:
  description: >-
    Six initial sleeves of 6 stocks each, totaling up to 36 symbols. All symbols must be US-listed
    equities available on Alpaca with OHLCV history from at least 2020-01-01.
entry_rules: >-
  Identical to the Regime-Aware Momentum Frozen Reference Paper v1 entry logic, applied per sleeve
  independently.
exit_rules: Identical to the Regime-Aware Momentum Frozen Reference Paper v1 exit logic.
risk_model:
  description: Per-sleeve risk isolation with portfolio-level concentration guard.
sweep_params: {}
required_data:
  - alpaca_equity_ohlcv
benchmark: SPY
acceptance_criteria:
  min_sharpe: 0.8
  max_drawdown: 20
  min_hit_rate: 50
  other: >-
    At least 4 of 6 sleeves must individually pass evidence thresholds. At least 2 non-original
    sleeves must show positive expectancy in at least one non-COVID-recovery era. No single sleeve
    may contribute more than 40% of total portfolio drawdown.
