signal_logic: >-
  Core attention signal: Wikipedia pageview velocity for each stock in the universe, computed as the
  5-day rolling rate-of-change in daily pageviews for the stock's primary Wikipedia article.
  Secondary momentum signal: 20-day price momentum derived from Alpaca equity OHLCV (close-to-close
  return over trailing 20 trading days). Combined signal: rank stocks by a weighted composite of
  normalized Wikipedia pageview velocity (weight 0.6) and price momentum rank (weight 0.4). Long
  candidates are those in the top decile of the composite rank.
universe:
  description: >-
    US-listed equities available via Alpaca (NYSE, NASDAQ, ARCA). Filtered to stocks with market cap
    > $500M (approximate, using Alpaca asset metadata) and average daily dollar volume > $5M.
    Excludes ETFs, ADRs, and OTC-only names. Approximately 800–1,200 names depending on date.
entry_rules: >-
  At the daily open (next-day market-on-open), enter long positions in stocks that (1) rank in the
  top decile of the composite attention-momentum signal on the prior close, (2) have average daily
  volume > $5M (screened via fundamentals_basic / Alpaca asset metadata), and (3) are not already
  held. Rebalance weekly (every Monday open); new top-decile entrants replace positions that have
  dropped out of the top two deciles.
exit_rules: >-
  Exit a position at the next Monday open if the stock falls out of the top two deciles of the
  composite signal. Hard stop-loss: exit intraday if price falls more than 8% from entry price
  (using Alpaca intraday bars). Maximum holding period: 20 trading days — force exit at open on day
  21 regardless of signal rank.
risk_model:
  description: >-
    Equal-weight across all held positions, capped at 20 simultaneous positions (5% each).
    Portfolio-level stop: if drawdown from rolling 60-day peak exceeds 15%, reduce all positions to
    50% size until drawdown recovers to within 8%. No leverage. Single-name cap: no position exceeds
    5% of portfolio NAV at entry. Liquidity filter: exclude stocks with prior-day dollar volume
    below $5M.
sweep_params:
  description: >-
    Wikipedia velocity lookback window: [3, 5, 10] days; price momentum lookback: [10, 20, 40] days;
    composite weight on Wikipedia signal: [0.4, 0.6, 0.8]; rebalance frequency: [weekly, bi-weekly];
    stop-loss threshold: [6%, 8%, 10%]
required_data:
  - alpaca_equity_ohlcv
  - wikipedia_pageviews
benchmark: SPY (S&P 500 ETF) buy-and-hold total return
acceptance_criteria:
  min_sharpe: 0.8
  max_drawdown: 20
  min_hit_rate: 50
  other: >-
    Annualized return must exceed SPY benchmark by at least 3% (net of assumed 0.05% per-trade
    slippage). Minimum 100 closed trades in backtest period for statistical validity.
candidate_strategy_family: Attention-momentum long-only equity
implementation_notes: >-
  Data-readiness warnings:

  - wikipedia_pageviews: PARTIAL (wikipedia_pageviews) - Wikimedia REST API backfill scripts exist
  and coverage runs 2016-present, making research backtesting feasible. However, no
  production/daily-update connector is wired into the Lab pipeline. Strategy cannot go live until
  connector lands. This is the primary reason for WARN rather than PASS.

  - fundamentals_basic (ADV and market cap filter): PARTIAL (fundamentals_basic) - Current-snapshot
  market cap and ADV are accessible via Alpaca asset metadata. Not point-in-time — universe
  construction filters will not be historically accurate. Acceptable for a first-pass backtest but
  introduces look-ahead bias in universe selection. Non-core for signal generation; used only for
  universe filtering.


  Wikipedia pageview data must be operator-pulled via research backfill scripts (Wikimedia REST API)
  before backtesting can begin. No production connector exists; daily updates are manual. Strategy
  cannot be promoted to live execution until a wired daily-update connector for wikipedia_pageviews
  lands in the Lab pipeline. Backtest is feasible in research mode given coverage from 2016-present.
  Operator should pre-map ticker symbols to Wikipedia article slugs for the target universe — this
  mapping is non-trivial and may require manual curation for ambiguous tickers.
