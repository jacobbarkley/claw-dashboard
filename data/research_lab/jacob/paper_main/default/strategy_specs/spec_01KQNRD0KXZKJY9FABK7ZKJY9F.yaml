signal_logic: >-
  Starting point for "This TIme It'll Work". The thesis is to expand upon the currently deployed
  live autonomous strategy for stocks:  Regime-Aware Momentum Frozen Reference Paper v1. Talon needs
  to mimic that entire strategy, with flexibility in mind for continuous improvements, but with the
  addition of many different groups of 6 stocks. Current we only trade AVGO, NVDA, AAPL, LLY, META
  and COS, but we should seek different sleeves. We need to keep in mind what this original group
  has in common to maintain fidelity between the 6 chosen stocks but this can increase our era
  robustness as certain groups may perform better under different market regimes. We will need to
  expand further on how to select stocks for the new groups but I’m curious to see what talon can
  produce from the beginning. Codex should translate this thesis into testable signal code after the
  operator reviews and tightens the draft.
universe:
  description: Configured large-cap U.S. equity universe with liquid Alpaca-tradable names.
entry_rules: >-
  Enter positions only when the thesis signal is active, liquidity is acceptable, and the configured
  universe member passes the benchmark/regime filter.
exit_rules: >-
  Exit positions when the thesis signal fails, the benchmark/regime filter flips, the holding window
  expires, or the risk guard is breached.
risk_model:
  description: >-
    Use small equal-weight positions, cap concentration per name, and block deployment until the
    experiment plan produces enough trades for a decisive verdict.
sweep_params:
  description: >-
    Start with a narrow smoke sweep; expand only after the first run shows enough trade count and
    clean data coverage.
