implementation_notes: >-
  Data-readiness warnings:

  - COS in the original sleeve may refer to a TSX-listed ticker (Canadian Oil Sands or similar).
  Operator should confirm Alpaca availability before job submission. If unavailable, substitute with
  a US-listed equivalent (e.g., CVX or XOM, though those appear in the energy sleeve).

  - Sleeve composition is static in v1. Dynamic sleeve selection from a broader screened universe is
  deferred to v2 and is not a data blocker for this spec.


  This strategy is a multi-sleeve extension of the live Regime-Aware Momentum Frozen Reference Paper
  v1. The original sleeve (AVGO, NVDA, AAPL, LLY, META, COS) is preserved as-is and serves as the
  live reference. New sleeves are added in parallel. Sleeve composition is frozen in v1; dynamic
  sleeve selection (e.g., screening from a broader universe) is deferred to v2. The operator should
  confirm whether all new tickers are tradeable on Alpaca before promotion. COS should be verified
  for Alpaca availability as it may be a TSX-listed ticker.
