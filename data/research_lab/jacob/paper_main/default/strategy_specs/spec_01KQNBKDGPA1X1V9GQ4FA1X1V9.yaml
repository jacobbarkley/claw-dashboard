  decisive_verdict_rules:
    pass: >-
      Passes only if it beats the benchmark after meeting the minimum trade-count and evaluated-days
      thresholds.
    inconclusive: >-
      Inconclusive if trade count, evaluated days, or runnable-era coverage is below the evidence
      threshold.
    fail: >-
