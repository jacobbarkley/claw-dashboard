  known_limitations:
    - >-
      COS (Costco or Canadian Oil Sands depending on exchange) must be verified as Alpaca-tradeable.
      If COS is a TSX ticker it will not be available; operator should substitute or confirm.
    - >-
      Sleeve composition is frozen at spec time and not dynamically optimized — this is intentional
      for v1 but limits adaptability to structural market changes.
    - >-
      The original sleeve is live and its backtest is already known-good; the experiment here
      primarily validates the new sleeves and the rotation framework.
    - >-
      No exotic data dependencies — all signals are OHLCV-derived, so data plumbing is
      straightforward and the first run is a genuine historical edge test, not a plumbing-only run.
    - >-
      Equal capital split across sleeves means underperforming sleeves drag returns; v2 should
      consider regime-conditional sleeve weighting.
    - >-
      Out-of-sample window (2020-2021) includes COVID crash which may produce anomalous
      regime-filter behavior due to speed of drawdown and recovery.
