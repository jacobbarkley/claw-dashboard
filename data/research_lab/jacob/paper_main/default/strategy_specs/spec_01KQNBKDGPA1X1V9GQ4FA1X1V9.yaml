signal_logic: >-
  {"regime_filter":{"description":"SPY-based regime gate identical to the parent Regime-Aware
  Momentum strategy. Compute SPY 50-day and 200-day simple moving averages. Bull regime: SPY close >
  SMA50 > SMA200. Bear regime: SPY close < SMA50. Neutral:
  otherwise.","features":["SPY_SMA50","SPY_SMA200","SPY_close"]},"momentum_signal":{"description":"For
  each stock in each sleeve, compute 20-day and 60-day trailing return momentum scores. Rank stocks
  within each sleeve by composite momentum score (equal-weight of 20d and 60d returns). Select top-N
  (default N=3) within each sleeve for entry
  consideration.","features":["trailing_return_20d","trailing_return_60d","momentum_rank_within_sleeve"]},"volume_confirmation":{"description":"Require
  entry-day volume >= 1.0x the stock's 20-day average daily volume to confirm momentum
  signal.","features":["volume","ADV_20d"]}}
universe:
  description: >-
    {"type":"multi_sleeve_fixed","sleeves":[{"id":"sleeve_original","label":"Original
    Tech-Bio","tickers":["AVGO","NVDA","AAPL","LLY","META","COS"],"notes":"Live deployed sleeve.
    Included as reference and benchmark anchor."},{"id":"sleeve_mega_tech","label":"Mega-Cap
    Software & Cloud","tickers":["MSFT","GOOGL","AMZN","CRM","ADBE","NOW"],"notes":"Large-cap
    software and cloud leaders with strong momentum
    histories."},{"id":"sleeve_energy_infra","label":"Energy &
    Infrastructure","tickers":["XOM","CVX","NEE","SLB","EOG","PSX"],"notes":"Energy majors and
    infrastructure; tends to outperform in inflationary/commodity
    regimes."},{"id":"sleeve_financials","label":"Financials &
    Payments","tickers":["JPM","GS","V","MA","BLK","AXP"],"notes":"Large-cap financials and payment
    networks; regime-sensitive to rate cycles."},{"id":"sleeve_healthcare","label":"Healthcare &
    Biotech","tickers":["UNH","JNJ","ABBV","MRK","TMO","DHR"],"notes":"Defensive healthcare plus
    high-growth biotech; diversifies from tech-heavy original."}],"selection_criteria_notes":"Each
    sleeve of six is chosen to share: (1) large-cap status (>$50B market cap at selection), (2) high
    average daily volume (>$500M ADV), (3) sector leadership, (4) demonstrated multi-year momentum
    profiles. Sleeve composition is frozen at spec time; a future v2 will introduce dynamic sleeve
    selection rules."}
entry_rules: >-
  {"conditions":["Regime filter is Bull or Neutral (no new entries in Bear regime)","Stock ranks in
  top 3 by composite momentum within its sleeve","Entry-day volume >= 1.0x ADV_20d","No existing
  open position in the same ticker"],"execution":"Market-on-open next day after signal
  fires","position_sizing":"Equal-weight within active sleeve; max 1/6 of sleeve capital per
  position. Total capital split equally across active sleeves (operator to configure number of
  active sleeves at runtime)."}
exit_rules: >-
  {"stop_loss":"7% trailing stop from entry price (mirroring parent strategy default; sweep
  candidate)","profit_target":"20% from entry price (sweep candidate)","regime_exit":"Exit all
  positions in a sleeve if regime flips to Bear","momentum_exit":"Exit if stock falls out of top 3
  momentum rank within sleeve on two consecutive daily closes","time_exit":"Maximum hold of 60
  calendar days"}
risk_model:
  description: >-
    {"max_open_positions_per_sleeve":3,"max_sleeve_allocation":"Equal fractional split of total
    capital across enabled sleeves","bear_regime_cash":"Move sleeve capital to cash when regime =
    Bear","correlation_note":"Sleeves are designed to be sector-diverse; no explicit cross-sleeve
    correlation cap in v1 but operator should monitor drawdown across sleeves in correlated
    sell-offs."}
sweep_params:
  description: >-
    {"stop_pct":[0.05,0.07,0.1],"target_pct":[0.15,0.2,0.25],"momentum_lookback_days":[20,40,60],"top_n_per_sleeve":[2,3],"sleeves_active":["sleeve_original","sleeve_mega_tech","sleeve_energy_infra","sleeve_financials","sleeve_healthcare"]}
