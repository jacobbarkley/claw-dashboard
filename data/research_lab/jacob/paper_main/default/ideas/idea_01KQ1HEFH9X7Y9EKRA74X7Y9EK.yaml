title: Ape Wisdom
thesis: >-
  The plan is simple. We start by targeting stocks that are trending in places like r/wallstreetbets
  and similar circles on X (also monitored by sites like apewisdom.com) and perform technical
  analysis on hot candidates in the dataset to target which ones still hold an edge and haven’t been
  fully priced in yet. Some may be large well known companies which we should pay attention to, but
  I think there’s a lot of gain we can find from the newer stocks on that appear so long as we don’t
  get greedy. This strategy will consistently sweep apewisdom’s top 100 and filter them out by ones
  with a high likes to mentions ratio, and those whose current trading volume is within a standard
  deviation from its average 30 day volume to help weed out ones that have already moved
  considerably. We can then look at the RSI, several other moving average indicators to fine tune
  further and then perform market research on the remainders. Also sets reasonable sell limits to
  enjoy healthy gain without getting greedy.
