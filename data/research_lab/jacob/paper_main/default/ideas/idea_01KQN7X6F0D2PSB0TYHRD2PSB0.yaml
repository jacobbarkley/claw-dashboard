title: Frozen Six Rotation
thesis: >-
  The thesis is to expand upon the currently deployed live autonomous strategy for stocks: 
  Regime-Aware Momentum Frozen Reference Paper v1. Talon needs to mimic that entire strategy, with
  flexibility in mind for continuous improvements, but with the addition of many different groups of
  6 stocks. Current we only trade AVGO, NVDA, AAPL, LLY, META and COS, but we should seek different
  sleeves. We need to keep in mind what this original group has in common to maintain fidelity
  between the 6 chosen stocks but this can increase our era robustness as certain groups may perform
  better under different market regimes. We will need to expand further on how to select stocks for
  the new groups but I’m curious to see what talon can produce from the beginning.
